<!DOCTYPE html>
<html>
<head>
    <title>Book Test Drive</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color: white;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 400px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
}

/* CAR PREVIEW */
.car-preview img {
    width: 120px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.car-preview h3 {
    color: #00e6e6;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    margin-top: 10px;
    background: linear-gradient(45deg,#ff6a00,#ee0979);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>🚗 Book Test Drive</h2>

        <!-- CAR INFO -->
        <div class="car-preview">
            <img src="{{ car.image.url }}">
            <h3>{{ car.brand }} {{ car.name }}</h3>
        </div>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="date" name="date" required>
            <input type="time" name="time" required>

            <button type="submit">Confirm Booking</button>
        </form>

    </div>
</div>

</body>
</html>
