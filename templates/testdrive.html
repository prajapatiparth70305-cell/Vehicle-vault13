<!DOCTYPE html>
<html>
<head>

<title>Test Drive</title>

<style>

body{
background:#0f172a;
font-family:Arial;
}

.container{
width:420px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
color:#0f172a;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.success{
background:#22c55e;
color:white;
padding:10px;
text-align:center;
border-radius:5px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>🚗 Book Test Drive</h2>

{% if success %}
<div class="success">
Test Drive Booked Successfully!
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<select name="car" required>

<option value="">Select </option>

<option>Hyundai Creta</option>
<option>Tata Nexon</option>
<option>Mahindra Thar</option>
<option>Maruti Brezza</option>

</select>

<input type="date" name="date" required>

<input type="time" name="time" required>

<button type="submit">Book Test Drive</button>

</form>

</div>

</body>
</html>
