<!DOCTYPE html>
<html>
<head>
<title>Book Test Drive</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height:100vh;
    background: linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Glass Card */
.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    width:350px;
    text-align:center;
}

/* Heading */
h1 {
    margin-bottom:20px;
}

/* Inputs */
select, input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background: rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
    outline:none;
}

/* Placeholder color */
input::placeholder {
    color:#ddd;
}

/* Button */
button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow:0 5px 20px rgba(0,198,255,0.5);
}

/* Selected car text */
#carName {
    margin:10px 0;
    font-size:14px;
    color:#00eaff;
}

/* Back button */
.back-btn {
    position:absolute;
    top:20px;
    left:20px;
    text-decoration:none;
    color:white;
    background: rgba(255,255,255,0.1);
    padding:8px 15px;
    border-radius:8px;
    transition:0.3s;
}

.back-btn:hover {
    background:#00c6ff;
}

</style>

<script>
function showCarName() {
    let select = document.getElementById("car");
    let selectedText = select.options[select.selectedIndex].text;
    document.getElementById("carName").innerText = "🚘 Selected Car: " + selectedText;
}
</script>

</head>

<body>

<a href="javascript:history.back()" class="back-btn">⬅ Back</a>

<div class="container">
    <h1>🚗 Book Test Drive</h1>

    <form method="POST">
        {% csrf_token %}

        <select name="car" id="car" onchange="showCarName()" required>
            <option value="">Select Car</option>
            {% for car in cars %}
            <option value="{{ car.id }}">{{ car.name }}</option>
            {% endfor %}
        </select>

        <p id="carName"></p>
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="date" name="date" required>
        <input type="time" name="time" required>

        <button type="submit">Confirm Booking</button>
    </form>
</div>

</body>
</html>
