<!DOCTYPE html>
<html>
<head>
    <title>EMI Calculator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c853, #64dd17);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            text-align: center;
        }

        .back-btn {
            margin-top: 15px;
            display: block;
            text-align: center;
            text-decoration: none;
            color: white;
        }

        input[type=range] {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>{{ car.name }} EMI</h2>

    <input type="hidden" id="price" value="{{ car.price }}">

    
    <label>Down Payment</label>
    <input type="range" id="downRange" min="0" max="{{ car.price }}" step="50000" value="0" oninput="syncDown()">
    <input type="number" id="down" value="0" oninput="calculateEMI()">

    <label>Interest Rate (%)</label>
    <input type="number" id="rate" value="9" oninput="calculateEMI()">

    
    <label>Years</label>
    <input type="range" id="yearRange" min="1" max="10" value="5" oninput="syncYears()">
    <input type="number" id="years" value="5" oninput="calculateEMI()">

    <button class="btn" onclick="calculateEMI()">Calculate EMI</button>

    <div class="result-box">
        <h3 id="emi">Monthly EMI: ₹ 0</h3>
        <p id="total"></p>
    </div>

    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>

</div>

<script>
function syncDown() {
    document.getElementById("down").value =
    document.getElementById("downRange").value;
    calculateEMI();
}

function syncYears() {
    document.getElementById("years").value =
    document.getElementById("yearRange").value;
    calculateEMI();
}

function calculateEMI() {

    let P = parseFloat(document.getElementById("price").value);
    let down = parseFloat(document.getElementById("down").value) || 0;
    let R = parseFloat(document.getElementById("rate").value) / 12 / 100;
    let N = parseFloat(document.getElementById("years").value) * 12;

    let loan = P - down;

    if (loan <= 0) {
        document.getElementById("emi").innerHTML =
        "❌ Invalid Down Payment";
        document.getElementById("total").innerHTML = "";
        return;
    }

    let emi = (loan * R * Math.pow(1+R,N)) / (Math.pow(1+R,N)-1);
    let total = emi * N;

    document.getElementById("emi").innerHTML =
    "Monthly EMI: ₹ " + Math.round(emi);

    document.getElementById("total").innerHTML =
    "Total Payment: ₹ " + Math.round(total);
}
window.onload = calculateEMI;
</script>


</body>
</html>
