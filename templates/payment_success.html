<!DOCTYPE html>
<html>
<head>
<title>Payment Successful</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#43cea2,#185a9d);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.success-card{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.success-icon{
    font-size:70px;
    color:green;
}

h1{
    color:#333;
}

p{
    color:#666;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#28a745;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.btn:hover{
    background:#218838;
}

.history-btn{
    background:#007bff;
}

.history-btn:hover{
    background:#0069d9;
}

</style>
</head>

<body>

<div class="success-card">

<div class="success-icon">✔</div>

<h1>Payment Successful</h1>

<p>Your car purchase has been completed successfully.</p>

<p>Thank you for buying from Car 🚗</p>

<a href="{% url 'cars' %}" class="btn green">View Cars </a>

<a href="{% url 'purchase_history' %}" class="btn blue">Purchase History </a>

</div>

</body>
</html>
