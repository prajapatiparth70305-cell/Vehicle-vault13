
<!DOCTYPE html>
<html>
<head>
<title>Add New Car</title>

<style>

body{
background:#0b1c3a;
font-family:Arial;
color:white;
}

.container{
width:60%;
margin:auto;
margin-top:40px;
background:#1f3b73;
padding:30px;
border-radius:12px;
box-shadow:0px 0px 10px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
}

table td{
padding:10px;
}

input, select, textarea{
width:100%;
padding:8px;
border-radius:5px;
border:none;
}

.btn{
margin-top:20px;
padding:10px 20px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Add New Car</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}


<table>

<tr>
<td>Car Name</td>
<td><input type="text" name="name"></td>
</tr>

<tr>
<td>Brand</td>
<td><input type="text" name="brand"></td>
</tr>

<tr>
<td>Model</td>
<td><input type="text" name="model"></td>
</tr>

<tr>
<td>Car Number</td>
<td><input type="text" name="car_number"></td>
</tr>

<tr>
<td>Mileage</td>
<td><input type="text" name="mileage"></td>
</tr>

<tr>
<td>Fuel Type</td>
<td>
<select name="fuel_type">
<option>Petrol</option>
<option>Diesel</option>
<option>CNG</option>
<option>Electric</option>
</select>
</td>
</tr>

<tr>
<td>Price</td>
<td><input type="number" name="price"></td>
</tr>

<tr>
<td>Car Image</td>
<td><input type="file" name="image"></td>
</tr>

<tr>
<td>Description</td>
<td><textarea name="description"></textarea></td>
</tr>

</table>

<button type="submit" class="btn">Add Car</button>

</form>

</div>

</body>
</html>
