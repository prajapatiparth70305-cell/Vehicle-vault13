<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 360px;
            color: white;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(25px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input::placeholder {
            color: #ddd;
        }

        input:focus {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .error {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 13px;
        }

        .success {
            margin-top: 10px;
            color: #00ffcc;
            font-size: 13px;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #ccc;
        }

    </style>
</head>
<body>

<div class="card">
    <h2>🔒 Reset Password</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="email" name="email" placeholder="Enter your email again" required>
        </div>

        <div class="input-group">
            <input type="password" id="pass1" name="password" placeholder="New Password" required>
            <span class="toggle" onclick="togglePass('pass1')">👁</span>
        </div>

        <div class="input-group">
            <input type="password" id="pass2" name="confirm" placeholder="Confirm Password" required>
            <span class="toggle" onclick="togglePass('pass2')">👁</span>
        </div>

        <button type="submit">Update Password</button>
    </form>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="note">Use a strong password 🔐</div>
</div>

<script>
    function togglePass(id) {
        let input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
