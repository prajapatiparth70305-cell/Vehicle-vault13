<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 340px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #ddd;
        }

        input:focus {
            background: rgba(255,255,255,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .error {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 13px;
        }

        .success {
            margin-top: 10px;
            color: #00ffcc;
            font-size: 13px;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #ddd;
        }

        .back-link {
            display: block;
            margin-top: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
        }

        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🔑 Forgot Password</h2>

    <form method="POST">
        {% csrf_token %}
        
        <div class="input-group">
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <button type="submit">Send Reset Link</button>
    </form>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="note">We’ll help you recover your account 🔐</div>

    <a href="/core/login/" class="back-link">← Back to Login</a>
</div>

</body>
</html>
