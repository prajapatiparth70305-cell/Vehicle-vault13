<!DOCTYPE html>
<html>
<head>
<title>Our Cars</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

h1{
    text-align:center;
    color:white;
    margin-top:30px;
}

/* Add Car Button */

.add-btn{
    display:block;
    width:120px;
    margin:20px auto;
    text-align:center;
    padding:10px;
    background:#00c6ff;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* Container */

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

/* Car Card */

.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    text-align:center;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

/* Car Image */

.card img{
    width:100%;
}

/* Price */

.card p{
    color:#00ff9c;
    font-size:18px;
    font-weight:bold;
}

/* Buttons */

.view-btn{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:linear-gradient(135deg,#ff512f,#dd2476);
    color:white;
    padding:8px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>
<a href="{% url 'dashboard' %}" class="back-btn">⬅ Back</a>
<h1>🚗 Our Cars</h1>

<a href="{% url 'add_car' %}" class="add-btn">+ Add Car</a>

<div class="container">

{% for car in cars %}

<div class="card">

<img src="{{car.image.url}}">

<h3>{{car.name}}</h3>

<p>₹ {{car.price}}</p>



<a href="{% url 'car_detail' car.id %}" class="view-btn">
View Car
</a>



</div>

{% endfor %}

</div>

</body>
</html>
