<!DOCTYPE html>
<html>
<head>
<title>Our Cars</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 40px;
    position:relative;
}

/* Center Title */
.header h1{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:30px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    padding:8px 20px;
    border-radius:20px;
}

/* Back Button */
.back-btn{
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    padding:10px 18px;
    border-radius:25px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}
.back-btn:hover{
    transform:scale(1.1);
}

/* Test Drive Button */
.testdrive{
    background: linear-gradient(45deg,#00ff9d,#00c6ff);
    color:black;
    font-weight:bold;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}
.testdrive:hover{
    transform:scale(1.1);
}

/* SEARCH */
.search-box{
    text-align:center;
    margin-top:30px;
}
.search-box input{
    width:50%;
    padding:14px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* ADD BUTTON CENTER */
.add-wrapper{
    display:flex;
    justify-content:center;
    margin-top:25px;
}
.add-car-btn{
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    padding:12px 35px;
    border-radius:30px;
    font-weight:bold;
    text-decoration:none;
    color:white;
    transition:0.3s;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
}
.add-car-btn:hover{
    transform:scale(1.1);
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:40px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:25px;
    text-align:center;
    transition:0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.card:hover{
    transform: translateY(-12px) scale(1.03);
}

/* IMAGE */
.card img{
    width:140px;
    height:100px;
    border-radius:12px;
    object-fit:cover;
    transition:0.3s;
}
.card img:hover{
    transform:scale(1.1);
}

/* PRICE */
.price{
    color:#00ffcc;
    font-size:20px;
    font-weight:bold;
}

/* BUTTONS */
.btn{
    padding:10px 18px;
    margin:8px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

/* VIEW */
.view{
    background: linear-gradient(45deg,#36d1dc,#5b86e5);
}
.view:hover{
    transform:scale(1.1);
}

/* DELETE */
.delete{
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
}
.delete:hover{
    transform:scale(1.1);
}

/* TEST DRIVE BUTTON IN CARD */
.test-btn{
    background: linear-gradient(45deg,#ffcc00,#ff9900);
    color:black;
}
.test-btn:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <a href="{% url 'dashboard' %}" class="back-btn">⬅ Back</a>

    <h1>🚗 Our Cars</h1>

    <a href="{% url 'test_drive' %}">
        <button class="testdrive">🚗 Book Test Drive</button>
    </a>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" placeholder="🔍 Search your dream car...">
</div>

<!-- ADD BUTTON -->
<div class="add-wrapper">
    <a href="{% url 'add_car' %}" class="add-car-btn">
        ➕ Add New Car
    </a>
</div>

<!-- CAR LIST -->
<div class="container">

{% for car in cars %}
<div class="card">

    {% if car.image %}
        <img src="{{ car.image.url }}" alt="car">
    {% endif %}

    <h2>{{ car.name }}</h2>
    <p class="price">₹ {{ car.price }}</p>

    <div>
        <a href="{% url 'car_detail' car.id %}">
            <button class="btn view">View</button>
        </a>

        <a href="{% url 'delete_car' car.id %}">
            <button class="btn delete">Delete</button>
        </a>
</div>
{% endfor %}

</div>

</body>
</html>
