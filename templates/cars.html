{% load static %}

<!DOCTYPE html>
<html>
<head>

<style>

body{
background:#071c3a;
color:white;
font-family:Arial;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:40px;
justify-content:center;
}

.card{
width:250px;
background:#0d2a52;
border-radius:10px;
overflow:hidden;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.btn{
display:inline-block;
margin-bottom:15px;
padding:8px 15px;
background:#00c6ff;
color:white;
text-decoration:none;
border-radius:5px;
}

.add-btn{
background:#00c6ff;
color:white;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}


</style>

</head>

<body>
<h1 style="text-align:center">Our Cars</h1>
<a href="{% url 'add_car' %}" class="add-btn">Add Car</a>
</div>
<div class="container">
    

{% for car in cars %}

<div class="card">

<img src="{{car.image.url}}">


<h3>{{car.name}}</h3>

<p>₹ {{car.price}}</p>

<a href="{% url 'car_detail' car.id %}" class="btn">View Car</a>

</div>

{% endfor %}

</div>

</body>
</html>
