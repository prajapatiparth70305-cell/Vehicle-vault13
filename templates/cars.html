<!DOCTYPE html>
<html>
<head>
    <title>Our Cars</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.88);
            --surface-soft: rgba(255, 255, 255, 0.06);
            --text: #edf2f7;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #60a5fa;
            --border: rgba(148, 163, 184, 0.18);
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 18%),
                        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.12), transparent 20%),
                        linear-gradient(135deg, #0b1220 0%, #111827 45%, #0f172a 100%);
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 20%),
                        radial-gradient(circle at 80% 10%, rgba(236, 72, 153, 0.12), transparent 18%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        .page-shell {
            position: relative;
            z-index: 1;
            padding: 30px 20px 40px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .topbar {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
            margin-bottom: 28px;
        }

        .topbar h1 {
            margin: 0;
            font-size: clamp(2rem, 2.5vw, 2.4rem);
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            color: transparent;
        }

        .topbar .action-links {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .topbar a,
        .search-box button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            border: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .topbar a:hover,
        .search-box button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
            box-shadow: 0 18px 32px rgba(0,0,0,0.22);
        }

        .back-btn,
        .testdrive {
            color: white;
        }

        .back-btn {
            background: linear-gradient(135deg, #fb7185, #f97316);
        }

        .testdrive {
            background: linear-gradient(135deg, #22d3ee, #3b82f6);
        }

        .search-wrapper {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .search-box {
            width: min(680px, 100%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 10px 16px;
            backdrop-filter: blur(18px);
        }

        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            padding: 12px 8px;
            font-size: 1rem;
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        .search-box button {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 24px;
        }

        .card {
            position: relative;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 32px 60px rgba(0, 0, 0, 0.35);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 40%);
            pointer-events: none;
        }

        .card-image {
            position: relative;
            overflow: hidden;
            min-height: 200px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.75), transparent 40%);
        }

        .card-image img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .card-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(8, 145, 178, 0.88);
            color: white;
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
            padding: 22px 20px 18px;
            display: grid;
            gap: 14px;
            text-align: center;
        }

        .card-content h3 {
            margin: 0;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .price {
            margin: 0;
            color: #7dd3fc;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .card-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .card-actions a {
            width: calc(50% - 8px);
            min-width: 120px;
            text-decoration: none;
        }

        .card-actions button {
            width: 100%;
            padding: 12px 0;
            border-radius: 999px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .card-actions button:hover {
            transform: translateY(-2px);
            opacity: 0.92;
        }

        .view {
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
        }

        .delete {
            background: linear-gradient(135deg, #fb7185, #f97316);
            color: white;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .topbar {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .topbar .action-links {
                justify-content: center;
            }

            .container {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .container {
                grid-template-columns: 1fr;
            }

            .card-image img {
                height: 180px;
            }

            .topbar {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="topbar">
            <a href="{% url 'dashboard' %}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <h1>🚗 Our Cars</h1>
            <div class="action-links">
                <a href="{% url 'test_drive' %}" class="testdrive"><i class="fa-solid fa-road"></i> Test Drive</a>
            </div>
        </div>

        <div class="search-wrapper">
            <form method="GET" class="search-box">
                <input type="text" name="search" placeholder="Search car..." value="{{ search_query }}">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </div>

        <div class="container">
            {% for car in cars %}
            <div class="card">
                <div class="card-image">
                    {% if car.image %}
                        <img src="{{ car.image.url }}" alt="{{ car.name }}">
                    {% endif %}
                    <span class="card-badge">₹ {{ car.price }}</span>
                </div>
                <div class="card-content">
                    <h3>{{ car.name }}</h3>
                    <p class="price"></p>
                    <div class="card-actions">
                        <a href="{% url 'car_detail' car.id %}"><button type="button" class="view">View</button></a>
                       
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
