<!DOCTYPE html>
<html>
<head>
<title>Our Cars</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Heading */
h1{
    text-align:center;
    color:white;
    margin-top:20px;
}

/* Back Button */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:linear-gradient(135deg,#ff512f,#dd2476);
    color:white;
    padding:8px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
}

/* Add Button */
.add-btn{
    display:block;
    width:140px;
    margin:15px auto;
    text-align:center;
    padding:10px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.add-btn:hover{
    transform:scale(1.05);
}

/* Search Box */
.search-box {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.search-box input {
    width: 320px;
    padding: 12px 15px;
    border-radius: 25px 0 0 25px;
    border: none;
    outline: none;
    font-size: 14px;
}

.search-box button {
    padding: 12px 20px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    border-radius: 0 25px 25px 0;
    cursor: pointer;
    transition: 0.3s;
}

.search-box button:hover {
    background: linear-gradient(45deg, #0072ff, #00c6ff);
}

/* Container */
.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

/* Card */
.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    text-align:center;
    backdrop-filter:blur(15px);
    transition:0.3s;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

/* Image */
.card img{
    width:15%;
    border-radius:10px;
}

/* Name */
.card h3{
    color:white;
}

/* Price */
.card p{
    color:#00ff9c;
    font-size:18px;
    font-weight:bold;
}

/* View Button */
.view-btn{
    display:inline-block;
    margin-top:10px;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.view-btn:hover{
    transform:scale(1.05);
}

/* No Result */
.no-data{
    text-align:center;
    color:white;
    font-size:18px;
    margin-top:40px;
}
.delete-btn{
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.delete-btn:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<a href="{% url 'dashboard' %}" class="back-btn">⬅ Back</a>

<h1>🚗 Our Cars</h1>

<!-- 🔍 SEARCH (FIXED POSITION) -->
<form method="GET" class="search-box">
    <input 
        type="text" 
        name="search" 
        placeholder="🔍 Search cars like BMW, Creta..." 
        value="{{ search_query }}"
    >
    <button type="submit">Search</button>
</form>

<a href="{% url 'add_car' %}" class="add-btn">+ Add Car</a>

<div class="container">

{% for car in cars %}
<div class="card">

    <img src="{{car.image.url}}">

    <h3>{{car.name}}</h3>

    <p>₹ {{car.price}}</p>

    <a href="{% url 'car_detail' car.id %}" class="view-btn">
        View Car
    </a>
    <form action="{% url 'delete_car' car.id %}" method="POST" style="margin-top:10px;">
        {% csrf_token %}
    <button type="submit" class="delete-btn" 
        onclick="return confirm('Are you sure you want to delete this car?')">
        Delete
    </button>

</div>

{% empty %}
    <div class="no-data">😢 No cars found</div>
{% endfor %}

</div>

</body>
</html>
