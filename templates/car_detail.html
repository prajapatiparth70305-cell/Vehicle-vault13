<!DOCTYPE html>
<html>
<head>
    <title>Car Details</title>
    <style>
        body {
    background: linear-gradient(135deg, #0f2027, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: white;
}

.page-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.car-card {
    width: 900px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    text-align: center;
}

.car-image img {
    width: 300px;
    transition: 0.3s;
}

.car-image img:hover {
    transform: scale(1.05);
}

.car-details {
    margin-top: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.row span:first-child {
    color: #ccc;
}

.row span:last-child {
    font-weight: bold;
}

.btn-group {
    margin-top: 25px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.btn.buy {
    background: linear-gradient(45deg, #00c853, #64dd17);
}

.btn.emi {
    background: linear-gradient(45deg, #ff9800, #ff5722);
}

.btn.cart {
    background: linear-gradient(45deg, #2196f3, #00bcd4);
}

.btn.view {
    background: linear-gradient(45deg, #9c27b0, #673ab7);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}
</style>

<div class="page-container">

    <div class="car-card">

        <h2>🚗 Car Details</h2>

        <div class="car-image">
            <img src="{{ car.image.url }}" alt="car">
        </div>

        <div class="car-details">
            <div class="row"><span>Name</span><span>{{ car.name }}</span></div>
            <div class="row"><span>Brand</span><span>{{ car.brand }}</span></div>
            <div class="row"><span>Model</span><span>{{ car.model }}</span></div>
            <div class="row"><span>Mileage</span><span>{{ car.mileage }}</span></div>
            <div class="row"><span>Fuel Type</span><span>{{ car.fuel_type }}</span></div>
            <div class="row"><span>Price</span><span>₹ {{ car.price }}</span></div>
            <div class="row"><span>Description</span><span>{{ car.description }}</span></div>
        </div>

       
        <div class="btn-group">

            <a href="{% url 'add_to_cart' car.id %}" class="btn cart">🛒Add To Cart</a>
            <a href="{% url 'cars' %}" class="btn view">🔙 Back</a>

        </div>

    </div>

</div>
