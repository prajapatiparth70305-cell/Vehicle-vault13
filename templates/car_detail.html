<!DOCTYPE html>
<html>
<head>
    <title>Car Details</title>

<style>
body {
    background: linear-gradient(135deg, #0f2027, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: white;
}

.page-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.car-card {
    width: 900px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 0.5s ease-in-out;
}

/* IMAGE */
.car-image img {
    width: 130px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.car-image img:hover {
    transform: scale(1.1);
}

/* DETAILS */
.car-details {
    margin-top: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
}

.row span:first-child {
    color: #ccc;
}

.row span:last-child {
    font-weight: bold;
}

/* EXTRA */
.extra {
    margin-top: 10px;
    color: #ddd;
}

/* BUTTONS */
.btn-group {
    margin-top: 25px;
    display: flex;
    gap: 10px;
}

.btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.3s;
    text-align: center;
}

.insurance-btn {
    background: linear-gradient(45deg, #ff9800, #ff5722);
}

.btn.cart {
    background: linear-gradient(45deg, #2196f3, #00bcd4);
}

.btn.view {
    background: linear-gradient(45deg, #9c27b0, #673ab7);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="page-container">

    <div class="car-card">

        <h2>🚗 Car Details</h2>

        <div class="car-image">
            <img src="{{ car.image.url }}" alt="car">
        </div>

        

        <div class="car-details">
            <div class="row"><span>Name</span><span>{{ car.name }}</span></div>
            <div class="row"><span>Brand</span><span>{{ car.brand }}</span></div>
            <div class="row"><span>Model</span><span>{{ car.model }}</span></div>
            <div class="row"><span>Mileage</span><span>{{ car.mileage }}</span></div>
            <div class="row"><span>Fuel Type</span><span>{{ car.fuel_type }}</span></div>
            <div class="row"><span>Price</span><span>₹ {{ car.price }}</span></div>
            <div class="row"><span>Description</span><span>{{ car.description }}</span></div>
        </div>

        <div class="btn-group">

            <a href="{% url 'insurance_page' car.id %}" class="btn insurance-btn">
                🚗 Insurance
            </a>

            <a href="{% url 'add_to_cart' car.id %}" class="btn cart">
                🛒 Cart
            </a>

            <a href="{% url 'testdrive' %}">🧪 Test Drive</a>

            <a href="{% url 'cars' %}" class="btn view">
                🔙 Back
            </a>

        </div>

    </div>

</div>

</body>
</html>
