
<!DOCTYPE html>
<html>
<head>
<title>My Purchases</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#1d4350,#a43931);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:950px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn 0.6s ease-in-out;
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

th{
background:#2c3e50;
color:white;
padding:12px;
font-size:14px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
font-size:14px;
}

tr:hover{
background:#f9f9f9;
}

.success{
color:#27ae60;
font-weight:bold;
}

/* Buttons */
.view-btn{
background:#3498db;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:13px;
transition:0.3s;
}

.view-btn:hover{
background:#2980b9;
}

.delete-btn{
background:#e74c3c;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:13px;
transition:0.3s;
}

.delete-btn:hover{
background:#c0392b;
}

.back-btn{
display:block;
width:150px;
margin:20px auto 0;
text-align:center;
background:#2ecc71;
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
}

.back-btn:hover{
background:#27ae60;
}

/* Animation */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<h2>🚗 My Purchases</h2>

<table>

<tr>
<th>Car</th>
<th>Amount</th>
<th>Status</th>
<th>Date</th>
<th>Invoice</th>
<th>Action</th>
</tr>

{% for purchase in purchases %}

<tr>

<td>{{purchase.car.name}}</td>
<td>₹{{purchase.amount}}</td>

<td class="success">{{purchase.status}}</td>

<td>{{purchase.date}}</td>

<!-- Invoice -->
<td>
<a href="{% url 'view_invoice' purchase.id %}" class="view-btn">
View
</a>
</td>

<!-- Delete -->
<td>
<a href="{% url 'delete_purchase' purchase.id %}"
   class="delete-btn"
   onclick="return confirm('Are you sure to delete this purchase?')">
Delete
</a>
</td>

</tr>

{% empty %}

<tr>
<td colspan="6">No purchases found</td>
</tr>

{% endfor %}

</table>

<a href="/core/cars/" class="back-btn">⬅ Back to Cars</a>

</div>

</body>
</html>
