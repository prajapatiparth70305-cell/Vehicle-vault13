<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMI Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 380px;
    padding: 35px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    color: white;
    text-align: center;
}

.title {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 25px;
}

.amount {
    font-size: 40px;
    font-weight: bold;
    color: #00ffcc;
    margin-bottom: 20px;
}

.info {
    text-align: left;
    margin-top: 15px;
}

.row {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.status {
    margin-top: 15px;
    display: inline-block;
    padding: 8px 18px;
    border-radius: 20px;
    background: #00ffcc;
    color: black;
    font-size: 13px;
    font-weight: bold;
}

.buttons {
    margin-top: 25px;
}

.btn {
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 30px;
    margin: 5px;
    display: inline-block;
    font-size: 14px;
}

.back {
    background: linear-gradient(45deg, #ff4b2b, #ff416c);
    color: white;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">💳 EMI Details</div>
    <div class="subtitle">Payment Information</div>

    <div class="amount">₹{{ item.amount }}</div>

    <div class="info">

        <div class="row">
            <span>Payment ID</span>
            <span>{{ item.payment_id }}</span>
        </div>

        <div class="row">
            <span>Date</span>
            <span>{{ item.date }}</span>
        </div>

        <!-- ✅ NEW EMI DATA -->
        <div class="row">
            <span>Total EMI</span>
            <span>{{ item.total_emi }}</span>
        </div>

        <div class="row">
            <span>Paid EMI</span>
            <span>{{ item.paid_emi }}</span>
        </div>

        <div class="row">
            <span>Remaining EMI</span>
            <span>{{ item.remaining_emi }}</span>
        </div>

    </div>

    <!-- ✅ Dynamic Status -->
    <div class="status">
        {{ item.get_status }}
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <a href="/core/history/" class="btn back">⬅ Back</a>
    </div>

</div>

</body>
</html>
