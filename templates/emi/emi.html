<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMI Calculator</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    padding: 30px;
    width: 350px;
    border-radius: 20px;
    color: white;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 15px;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
}

.calc {
    background: #00c6ff;
    color: white;
}

.pay {
    background: #00e676;
    color: black;
}

#result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="box">
    <h2>🚗 EMI Calculator</h2>

    <div class="card">
        <h3>{{ car_name }}</h3>
        <p>₹{{ price }}</p>
    </div>

    <input type="number" id="price" value="{{ price }}" readonly>

    <input type="number" id="down" placeholder="Down Payment" oninput="updateLoan()">

    <input type="number" id="amount" placeholder="Loan Amount" readonly>

    <input type="number" id="rate" placeholder="Interest Rate (%) e.g. 10">

    <input type="number" id="years" placeholder="Years (e.g. 5, 10, 15)">

    <input type="hidden" id="total_emi">

    <button class="calc" onclick="calculateEMI()">Calculate EMI</button>

    <h3 id="result"></h3>

    <button class="pay" onclick="payNow()">Pay Now</button>
</div>

<script>

let finalEMI = 0; // ✅ store EMI safely

function updateLoan() {
    let price = parseInt(document.getElementById("price").value) || 0;
    let down = parseInt(document.getElementById("down").value) || 0;

    let loan = price - down;
    if (loan < 0) loan = 0;

    document.getElementById("amount").value = loan;
}

function calculateEMI() {

    let loan = parseInt(document.getElementById("amount").value);
    let rateInput = parseFloat(document.getElementById("rate").value);
    let years = parseInt(document.getElementById("years").value);

    if (!loan || !rateInput || !years) {
        alert("Fill all fields ❗");
        return;
    }

    if (rateInput > 20) {
        alert("Interest too high ❗");
        return;
    }

    if (years <= 0 || years > 20) {
        alert("Enter valid years (1-20)");
        return;
    }

    let R = rateInput / 12 / 100;
    let N = years * 12;

    document.getElementById("total_emi").value = N;

    let EMI = (loan * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

    finalEMI = Math.round(EMI); // ✅ store correct EMI

    let totalPayment = finalEMI * N;

    document.getElementById("result").innerText =
        "Monthly EMI: ₹" + finalEMI +
        "\nTotal Payment: ₹" + totalPayment +
        "\nDuration: " + years + " Years";
}

function payNow() {

    let totalEMI = document.getElementById("total_emi").value;

    if (!finalEMI || !totalEMI) {
        alert("Calculate EMI first ❗");
        return;
    }

    var options = {
        "key": "rzp_test_SRMYrgg9z1ynoY",
        "amount": finalEMI * 100, // ✅ correct (1 EMI only)
        "currency": "INR",
        "name": "Vehicle Vault",
        "description": "Monthly EMI Payment",

        handler: function (response) {
            window.location.href =
                `/core/success/?payment_id=${response.razorpay_payment_id}&amount=${finalEMI}&total_emi=${totalEMI}`;
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

</body>
</html>
