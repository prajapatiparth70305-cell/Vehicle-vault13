<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .otp-input {
            font-size: 24px;
            letter-spacing: 12px;
            text-align: center;
            border-radius: 10px;
            height: 55px;
        }

        .btn-primary {
            border-radius: 10px;
            font-weight: 500;
        }

        .resend-btn {
            border: none;
            background: none;
            color: #0d6efd;
            cursor: pointer;
        }

        .resend-btn:disabled {
            color: gray;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow-lg p-4" style="width: 380px;">

    <h3 class="text-center mb-2">🔐 Verify OTP</h3>
    <p class="text-center text-muted">Enter the 6-digit code sent to your email</p>

    {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input 
            type="text" 
            name="otp" 
            maxlength="6"
            class="form-control otp-input mb-3"
            placeholder="••••••"
            required
        >

        <button type="submit" class="btn btn-primary w-100">
            Verify OTP
        </button>
    </form>

    <!-- Timer + Resend -->
    <div class="text-center mt-3">
        <small class="text-muted">
            Resend OTP in <span id="timer">30</span>s
        </small><br>

        <button id="resendBtn" class="resend-btn mt-1" disabled>
            Resend OTP
        </button>
    </div>

</div>

<!-- JS TIMER -->
<script>
    let timeLeft = 30;
    const timerEl = document.getElementById("timer");
    const resendBtn = document.getElementById("resendBtn");

    let countdown = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerEl.innerText = "0";
            resendBtn.disabled = false;
        }
    }, 1000);

    // Resend OTP
    resendBtn.addEventListener("click", async () => {
        await fetch("/core/resend-otp/");
        alert("OTP Resent ✅");

        // reset timer
        timeLeft = 30;
        resendBtn.disabled = true;

        countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                resendBtn.disabled = false;
            }
        }, 1000);
    });
</script>

</body>
</html>
