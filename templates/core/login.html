<!DOCTYPE html>
<html>
<head>
<title>Vehicle Vault - Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#007bff;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Vehicle Vault Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p class="signup-link">
    Don't have an account? 
    <a href="{% url 'signup' %}">Signup</a>
</p>

</div>

</body>
</html>
