<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #5f9cff, #6be6c1);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .note {
            margin-top: 10px;
            font-size: 12px;
            color: gray;
        }

        .back-link {
            display: block;
            margin-top: 10px;
            color: #4facfe;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🔑 Forgot Password</h2>

    <form method="POST">
        {% csrf_token %}
        
        <input type="email" name="email" placeholder="Enter your email" required>

        <button type="submit">Send Reset Link</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="note">We’ll help you reset your password 🔐</div>

    <a href="/core/login/" class="back-link">← Back to Login</a>
</div>

</body>
</html>
